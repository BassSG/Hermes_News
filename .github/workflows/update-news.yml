name: Update Hermes News

on:
  workflow_dispatch:
  schedule:
    # 06:05 Thailand time = 23:05 UTC previous day
    - cron: '5 23 * * *'

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch latest RSS news
        run: python scripts/fetch_news.py
      - name: Commit updated news data
        run: |
          git config user.name "hermes-news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/news.json
          if git diff --cached --quiet; then
            echo "No news changes"
          else
            git commit -m "Update morning news data"
            git push
          fi
